app-id: io.github.mmarco94.tambourine
runtime: org.freedesktop.Platform
runtime-version: '25.08'
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '25.08'
    add-ld-path: .
sdk: org.freedesktop.Sdk
command: run.sh
finish-args:
  - --filesystem=xdg-music:ro
  - --socket=x11
  # See https://youtrack.jetbrains.com/issue/SKIKO-28 for Wayland support :(
  #  - --socket=wayland
  #  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=ipc
  - --device=dri
modules:
  - name: tambourine
    buildsystem: simple
    build-commands:
      # Installing the actual app
      - mv tambourine /app/
      - install -D run.sh /app/bin/run.sh
      # ffsampledsp requires libbz2.so.1.0, however Flatpak only provides libbz2.so.1.0.8
      - mkdir -p /app/lib/ffmpeg
      - mkdir -p /app/tambourine/lib/os
      - ln -s /usr/lib/x86_64-linux-gnu/libbz2.so.1.0.8 /app/tambourine/lib/os/libbz2.so.1.0
      # running the app to create the SharedArchiveFile
      - touch -d "1970-01-01T00:00:00Z" /app/tambourine/lib/app/tambourine-*.jar # setting a stable timestamp on the JAR
      - cp /app/tambourine/lib/app/tambourine.cfg /app/tambourine/lib/app/tambourine.cfg.bkp
      - echo "java-options=-Xshare:dump" >> /app/tambourine/lib/app/tambourine.cfg
      - echo "java-options=-XX:SharedClassListFile=/app/tambourine/lib/app/resources/tambourine.classlist" >> /app/tambourine/lib/app/tambourine.cfg
      - echo "java-options=-XX:SharedArchiveFile=/app/tambourine/lib/app/resources/tambourine.jsa" >> /app/tambourine/lib/app/tambourine.cfg
      - /app/tambourine/bin/tambourine
      # restoring original config and add class archive
      - mv /app/tambourine/lib/app/tambourine.cfg.bkp /app/tambourine/lib/app/tambourine.cfg
      - echo "java-options=-XX:SharedArchiveFile=/app/tambourine/lib/app/resources/tambourine.jsa" >> /app/tambourine/lib/app/tambourine.cfg
      # Cleanup
      - rm /app/tambourine/lib/app/resources/tambourine.classlist
      - stat /app/tambourine/lib/app/tambourine-*.jar # printing the jar stats' for debugging
    sources:
      - type: dir
        # Use main-release for release builds
        path: ../build/compose/binaries/main-release/app
      - type: file
        path: run.sh
  - name: extras
    buildsystem: simple
    build-commands:
      - install -D io.github.mmarco94.tambourine.desktop /app/share/applications/io.github.mmarco94.tambourine.desktop
      - install -D icon.svg /app/share/icons/hicolor/scalable/apps/io.github.mmarco94.tambourine.svg
      - install -D icon-symbolic.svg /app/share/icons/hicolor/scalable/apps/io.github.mmarco94.tambourine-symbolic.svg
    sources:
      - type: file
        path: io.github.mmarco94.tambourine.desktop
      - type: file
        path: icon.svg
      - type: file
        path: icon-symbolic.svg
